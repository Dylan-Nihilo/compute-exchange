name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install HeroUI Pro
        env:
          HEROUI_KEY: ${{ secrets.HEROUI_KEY }}
        run: pnpm heroui:setup

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: compute-exchange-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/dylan-nihilo/compute-exchange:${{ github.sha }}
            ghcr.io/dylan-nihilo/compute-exchange:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            "HEROUI_KEY=${{ secrets.HEROUI_KEY }}"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: compute-exchange-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read

    steps:
      - name: Configure deployment SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on 47
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            compute-deploy@47.82.146.14 \
            "docker login ghcr.io --username '$GITHUB_ACTOR' --password-stdin >/dev/null && cd /data/compute-exchange && IMAGE_TAG='$GITHUB_SHA' docker compose pull && IMAGE_TAG='$GITHUB_SHA' docker compose up -d --remove-orphans --wait --wait-timeout 120"
